user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';
  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css text/event-stream;
  gzip_min_length 256;

  # ── Security headers (in addition to @fastify/helmet on the API) ─────────────
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # ── Rate limiting (Nginx-level guard before Fastify) ─────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=web:10m rate=10r/s;

  # ── Upstream definitions ──────────────────────────────────────────────────────
  upstream api_upstream {
    server api:4848;
    keepalive 32;
  }

  upstream web_upstream {
    server web:3000;
    keepalive 16;
  }

  include /etc/nginx/conf.d/*.conf;
}
