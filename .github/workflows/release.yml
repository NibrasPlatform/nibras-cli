name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify release metadata
        run: |
          TAG="${GITHUB_REF_NAME#refs/tags/}"
          ROOT_VERSION="$(node -p "require('./package.json').version")"
          CLI_VERSION="$(node -p "require('./apps/cli/package.json').version")"

          if [ "$TAG" != "v$ROOT_VERSION" ]; then
            echo "Tag $TAG does not match root package version v$ROOT_VERSION." >&2
            exit 1
          fi

          if [ "$CLI_VERSION" != "$ROOT_VERSION" ]; then
            echo "apps/cli version $CLI_VERSION does not match root version $ROOT_VERSION." >&2
            exit 1
          fi

      - name: Verify npm token is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured for this repository." >&2
            exit 1
          fi

      - name: Verify npm authentication
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build
        run: npm run build

      - name: Verify clean CLI download path
        run: npm run verify:cli-download

      - name: Verify publish tarball
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace apps/cli --access public --dry-run

      - name: Publish CLI to npm
        run: npm publish --workspace apps/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
