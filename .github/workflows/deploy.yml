name: Deploy

on:
  push:
    branches: [main]

# Only run one deploy at a time; cancel in-progress if a newer push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy-api:
    name: Deploy api → Fly.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy nibras-api
        run: |
          flyctl deploy \
            --config fly.api.toml \
            --app nibras-api \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-worker:
    name: Deploy worker → Fly.io
    runs-on: ubuntu-latest
    needs: [deploy-api]

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy nibras-worker
        run: |
          flyctl deploy \
            --config fly.worker.toml \
            --app nibras-worker \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy web → Fly.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy nibras-web
        run: |
          flyctl deploy \
            --config fly.web.toml \
            --app nibras-web \
            --build-arg NEXT_PUBLIC_NIBRAS_API_BASE_URL=https://nibras-api.fly.dev \
            --build-arg NEXT_PUBLIC_NIBRAS_WEB_BASE_URL=https://nibras-web.fly.dev \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
