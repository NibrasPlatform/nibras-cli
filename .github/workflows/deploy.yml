name: Deploy

on:
  push:
    branches: [main]

# Only run one deploy at a time; cancel in-progress if a newer push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy web → Fly.io
    runs-on: ubuntu-latest
    needs: [] # runs independently; add `needs: [test]` if you want CI to gate deploys

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy nibras-web
        run: |
          flyctl deploy \
            --config fly.web.toml \
            --app nibras-web \
            --build-arg NEXT_PUBLIC_NIBRAS_API_BASE_URL=https://nibras-api.fly.dev \
            --build-arg NEXT_PUBLIC_NIBRAS_WEB_BASE_URL=https://nibras-web.fly.dev \
            --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
