services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-praxis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-praxis}
      POSTGRES_DB: ${POSTGRES_DB:-praxis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praxis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4848:4848"
    command: sh -c "npx prisma migrate deploy && node apps/api/dist/server.js"

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
