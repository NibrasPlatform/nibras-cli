services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nibras}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nibras}
      POSTGRES_DB: ${POSTGRES_DB:-nibras}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nibras}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    # No direct port exposure — traffic goes through nginx
    command: sh -c "npx prisma migrate deploy && node apps/api/dist/server.js"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:${PORT:-4848}/healthz || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - internal
    # No direct port exposure — traffic goes through nginx

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - internal
      - external

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nibras}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nibras}
      POSTGRES_DB: ${POSTGRES_DB:-nibras}
    volumes:
      - ./backups:/backups
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    # Daily backup at 02:00 UTC — keeps 30 copies
    entrypoint: /bin/sh
    command: >
      -c "while true; do
        sleep $$(( 86400 - $$(date +%s) % 86400 + 7200 ));
        PGPASSWORD=$$POSTGRES_PASSWORD pg_dump
          -h postgres -U $$POSTGRES_USER $$POSTGRES_DB
          | gzip -9 > /backups/nibras-db-$$(date -u +%Y%m%dT%H%M%SZ).sql.gz;
        ls -t /backups/nibras-db-*.sql.gz | tail -n +31 | xargs -r rm;
        echo \"[backup] Done — $$(ls /backups/nibras-db-*.sql.gz | wc -l) backups stored\";
      done"

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
